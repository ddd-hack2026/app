<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DD KONG TYPING</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Press Start 2P',monospace;user-select:none;}
#wrap{position:relative;width:640px;height:560px;}
canvas{display:block;width:640px;height:560px;image-rendering:pixelated;}
#hud{position:absolute;top:6px;left:0;width:100%;display:flex;justify-content:space-between;padding:0 12px;font-size:9px;color:#fff;pointer-events:none;z-index:5;text-shadow:1px 1px #000;}
#input-box{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);border:2px solid #fc0;border-radius:4px;padding:5px 18px;font-size:11px;color:#fc0;letter-spacing:2px;min-width:180px;text-align:center;pointer-events:none;z-index:5;}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:20;}
#overlay h1{font-size:18px;color:#fc0;text-shadow:0 0 20px #f80;text-align:center;line-height:1.8;}
#overlay .sub{font-size:8px;color:#f84;text-align:center;line-height:2.4;}
#overlay button{font-family:'Press Start 2P',monospace;font-size:10px;background:#c40;color:#fff;border:none;padding:12px 28px;border-radius:4px;cursor:pointer;transition:transform 0.1s;}
#overlay button:hover{background:#f60;transform:scale(1.05);}
#diff-wrap{display:flex;gap:8px;}
.diff-btn{font-family:'Press Start 2P',monospace;font-size:8px;background:transparent;color:#888;border:1px solid #555;padding:5px 12px;border-radius:3px;cursor:pointer;transition:all 0.1s;}
.diff-btn.active,.diff-btn:hover{color:#fc0;border-color:#fc0;}
#mode-btn{font-family:'Press Start 2P',monospace;font-size:7px;background:transparent;color:#666;border:1px solid #444;padding:5px 12px;border-radius:3px;cursor:pointer;}
#mode-btn:hover{color:#fc0;border-color:#fc0;}
p.hint{margin-top:10px;font-family:'Press Start 2P',monospace;font-size:7px;color:#333;text-align:center;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="640" height="560"></canvas>
  <div id="hud">
    <span id="s-score">SCORE: 0</span>
    <span id="s-lv">LV 1</span>
    <span id="s-lives">❤️❤️❤️</span>
  </div>
  <div id="input-box">　</div>
  <div id="overlay">
    <h1>🦍 DD KONG<br>TYPING</h1>
    <p class="sub">樽の単語をタイプして消せ！<br>画面端に届くとライフ減少</p>
    <div id="diff-wrap">
      <button class="diff-btn active" onclick="setDiff(0,this)">EASY</button>
      <button class="diff-btn" onclick="setDiff(1,this)">NORMAL</button>
      <button class="diff-btn" onclick="setDiff(2,this)">HARD</button>
    </div>
    <button onclick="startGame()">▶ START</button>
    <button id="mode-btn" onclick="toggleMode()">モード: ひらがな</button>
  </div>
</div>
<p class="hint">ファイルをダブルクリックするだけでプレイできます</p>

<script>
// ══════════════════════════════════════════════
//  単語リスト
// ══════════════════════════════════════════════
const WORDS = {
  jp:{
    easy:  ['ねこ','いぬ','そら','うみ','やま','はな','つき','ほし','かわ','はる','なつ','あき','ふゆ','あさ','よる','きし','くも','かぜ','ゆき','あめ'],
    normal:['りんご','みかん','さかな','とり','くるま','でんき','えんぴつ','かがみ','ながれ','にわとり','たいよう','こどもの','さくらの','うごかす','みぎてに'],
    hard:  ['でんしゃ','ひこうき','たべもの','のみもの','おにぎり','たんぽぽ','かんがえる','はなびら','うごかない','ふしぎな','おおきなき','たのしいな','ゆめをみる']
  },
  en:{
    easy:  ['cat','dog','sky','sea','star','moon','fire','tree','bird','fish','rain','wind','snow','gold','king','run','hop','hit','axe','cup'],
    normal:['apple','barrel','typing','speed','score','bonus','flame','cloud','storm','power','combo','magic','sword','level','jungle','monkey'],
    hard:  ['keyboard','mountain','thunderbolt','adventure','destroyer','challenge','explosion','fantastic','superhero','blizzard','overdrive']
  }
};

// ══════════════════════════════════════════════
//  ステージ定義（足場）
//  { x, y, w, dir } dir= 1:右端で落下, -1:左端で落下
// ══════════════════════════════════════════════
// 640x560 キャンバス。足場は上から5段
// 樽はコング(上段)からスポーン → 各段を転がって次段へ落ちる
const FLOOR_H = 14;  // 足場の高さ
const BARREL_R = 14; // 樽半径

// 足場定義: [x, y, width, tilt(px), dropDir]
// tilt: 右端がtiltだけ下がっている傾き（傾斜）
// dropDir: 1=右端で落ちる, -1=左端で落ちる
const FLOORS = [
  // 段0（最上段・コングがいる）: 左寄り、右下がり
  { x:20,  y:100, w:260, tilt:18, dropDir:1  },
  // 段1: 右寄り、左下がり
  { x:200, y:200, w:400, tilt:-16, dropDir:-1 },
  // 段2: 左寄り、右下がり
  { x:20,  y:300, w:380, tilt:14, dropDir:1  },
  // 段3: 右寄り、左下がり
  { x:160, y:390, w:440, tilt:-12, dropDir:-1 },
  // 段4（地面）: 全幅
  { x:0,   y:490, w:640, tilt:0,  dropDir:1  },
];

// ══════════════════════════════════════════════
//  ゲーム状態
// ══════════════════════════════════════════════
const canvas  = document.getElementById('c');
const ctx     = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const inputBox= document.getElementById('input-box');
const sScore  = document.getElementById('s-score');
const sLv     = document.getElementById('s-lv');
const sLives  = document.getElementById('s-lives');

let barrels=[], particles=[];
let score=0, lives=3, level=1, frame=0;
let spawnTimer=0, spawnInterval=160, baseSpeed=1.2;
let gameRunning=false, currentInput='';
let useJP=true, diffIndex=0;
const DIFFS=['easy','normal','hard'];
const GRAVITY=0.35;

// ══════════════════════════════════════════════
//  UI
// ══════════════════════════════════════════════
function setDiff(i,el){
  diffIndex=i;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}
function toggleMode(){
  useJP=!useJP;
  document.getElementById('mode-btn').textContent='モード: '+(useJP?'ひらがな':'English');
}
function updateHUD(){
  sScore.textContent='SCORE: '+score;
  sLv.textContent='LV '+level;
  sLives.innerHTML='❤️'.repeat(Math.max(0,lives));
}

// ══════════════════════════════════════════════
//  足場ユーティリティ
// ══════════════════════════════════════════════
// 足場上のX座標に対するY座標（傾き込み）
function floorY(fl, x){
  const ratio = (x - fl.x) / fl.w;
  return fl.y + ratio * fl.tilt;
}

// 足場上のX座標における法線角度
function floorAngle(fl){
  return Math.atan2(fl.tilt, fl.w);
}

// 樽が乗っている足場を返す（下から順にチェック）
function getFloor(b){
  for(let i=FLOORS.length-1;i>=0;i--){
    const fl=FLOORS[i];
    if(b.x >= fl.x-4 && b.x <= fl.x+fl.w+4){
      const fy = floorY(fl, b.x) - BARREL_R;
      if(b.y >= fy-4 && b.y <= fy+30 && b.vy>=0){
        return i;
      }
    }
  }
  return -1;
}

// ══════════════════════════════════════════════
//  樽スポーン（コングの位置=段0上）
// ══════════════════════════════════════════════
function spawnBarrel(){
  const word = getWord();
  const speed = baseSpeed + Math.random()*0.5 + diffIndex*0.25;
  // コングは段0の左端付近にいる → そこから右向きに転がす
  const fl0 = FLOORS[0];
  const sx = fl0.x + 30;
  const sy = floorY(fl0, sx) - BARREL_R;
  barrels.push({
    x: sx, y: sy,
    vx: speed,        // 右向きに転がる
    vy: 0,
    word, typed:'',
    rot:0,
    floorIdx:0,       // 今乗っている段
    falling:false,
  });
}

function getWord(){
  const lang=useJP?'jp':'en';
  const list=WORDS[lang][DIFFS[diffIndex]];
  const used=new Set(barrels.map(b=>b.word));
  const avail=list.filter(w=>!used.has(w));
  return (avail.length>0?avail:list)[Math.floor(Math.random()*(avail.length>0?avail:list).length)];
}

// ══════════════════════════════════════════════
//  描画：背景・足場
// ══════════════════════════════════════════════
function drawBG(){
  // 黒背景
  ctx.fillStyle='#0a0005';
  ctx.fillRect(0,0,640,560);

  // 足場を描画
  FLOORS.forEach((fl,i)=>{
    // 鉄骨風グラデーション
    const topY    = fl.y;
    const topYr   = fl.y + fl.tilt;
    const botY    = topY + FLOOR_H;
    const botYr   = topYr + FLOOR_H;

    // 影
    ctx.beginPath();
    ctx.moveTo(fl.x,       topY+4);
    ctx.lineTo(fl.x+fl.w,  topYr+4);
    ctx.lineTo(fl.x+fl.w,  botYr+4);
    ctx.lineTo(fl.x,       botY+4);
    ctx.closePath();
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.fill();

    // 本体（赤茶色の鉄骨）
    ctx.beginPath();
    ctx.moveTo(fl.x,      topY);
    ctx.lineTo(fl.x+fl.w, topYr);
    ctx.lineTo(fl.x+fl.w, botYr);
    ctx.lineTo(fl.x,      botY);
    ctx.closePath();
    const grad=ctx.createLinearGradient(fl.x,topY,fl.x,botY+FLOOR_H);
    grad.addColorStop(0,'#cc3300');
    grad.addColorStop(0.4,'#992200');
    grad.addColorStop(1,'#661100');
    ctx.fillStyle=grad;
    ctx.fill();

    // 上面のハイライト
    ctx.beginPath();
    ctx.moveTo(fl.x,      topY);
    ctx.lineTo(fl.x+fl.w, topYr);
    ctx.strokeStyle='#ff6644';
    ctx.lineWidth=2;
    ctx.stroke();

    // リベット（ボルト）
    const rStep=40;
    for(let rx=fl.x+20;rx<fl.x+fl.w-10;rx+=rStep){
      const ry=floorY(fl,rx)+FLOOR_H/2;
      ctx.beginPath();
      ctx.arc(rx,ry,3,0,Math.PI*2);
      ctx.fillStyle='#ff9966';
      ctx.fill();
    }
  });
}

// ══════════════════════════════════════════════
//  描画：コング（段0左端）
// ══════════════════════════════════════════════
function drawKong(){
  const fl=FLOORS[0];
  const kx=fl.x+10;
  const ky=floorY(fl,kx)-10;
  ctx.font='44px serif';
  ctx.fillText('🦍',kx-10,ky);
  // 投げモーション（樽スポーン直後に揺れ）
}

// ══════════════════════════════════════════════
//  描画：樽
// ══════════════════════════════════════════════
function drawBarrel(b){
  ctx.save();
  ctx.translate(b.x, b.y);
  ctx.rotate(b.rot);

  // 本体
  ctx.beginPath();
  ctx.arc(0,0,BARREL_R,0,Math.PI*2);
  const bg=ctx.createRadialGradient(-4,-4,2,0,0,BARREL_R);
  bg.addColorStop(0,'#a05020');
  bg.addColorStop(1,'#5a2800');
  ctx.fillStyle=bg;
  ctx.fill();
  ctx.strokeStyle='#2a1000';
  ctx.lineWidth=1.5;
  ctx.stroke();

  // 木目横線
  [-6,0,6].forEach(dy=>{
    ctx.beginPath();
    ctx.ellipse(0,dy,BARREL_R,4,0,0,Math.PI*2);
    ctx.strokeStyle='rgba(60,20,0,0.6)';
    ctx.lineWidth=1;
    ctx.stroke();
  });

  // 金属帯
  [-7,7].forEach(dy=>{
    ctx.beginPath();
    ctx.moveTo(-BARREL_R,dy);
    ctx.lineTo(BARREL_R,dy);
    ctx.strokeStyle='#ddaa44';
    ctx.lineWidth=2;
    ctx.stroke();
  });

  ctx.restore();

  // 単語ラベル（回転なし）
  const fSize=useJP?13:10;
  ctx.font=`bold ${fSize}px ${useJP?'sans-serif':"'Press Start 2P'"}`;
  const tw=ctx.measureText(b.word).width;
  const dw=ctx.measureText(b.typed).width;
  const lx=b.x-tw/2;
  const ly=b.y-BARREL_R-8;

  // 背景
  ctx.fillStyle='rgba(0,0,0,0.78)';
  ctx.beginPath();
  roundRect(lx-5,ly-13,tw+10,18,3);
  ctx.fill();

  ctx.fillStyle='#44ff88';
  ctx.fillText(b.typed,lx,ly);
  ctx.fillStyle='#fff';
  ctx.fillText(b.word.slice(b.typed.length),lx+dw,ly);
}

function roundRect(x,y,w,h,r){
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// ══════════════════════════════════════════════
//  パーティクル
// ══════════════════════════════════════════════
function addParticles(x,y){
  for(let i=0;i<16;i++){
    particles.push({
      x,y,
      vx:(Math.random()-0.5)*8,
      vy:(Math.random()-0.5)*8-2,
      life:1,
      color:`hsl(${20+Math.random()*50},100%,60%)`
    });
  }
}
function drawParticles(){
  particles=particles.filter(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.2; p.life-=0.04;
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,3,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=1;
    return p.life>0;
  });
}

// ══════════════════════════════════════════════
//  樽の物理更新
// ══════════════════════════════════════════════
function updateBarrel(b){
  // 重力
  b.vy += GRAVITY;
  b.x  += b.vx;
  b.y  += b.vy;

  // 現在乗っている足場チェック
  let landed = false;
  for(let i=0;i<FLOORS.length;i++){
    const fl=FLOORS[i];
    if(b.x < fl.x-BARREL_R || b.x > fl.x+fl.w+BARREL_R) continue;
    const fy = floorY(fl,b.x) - BARREL_R;
    if(b.y >= fy && b.y <= fy+30 && b.vy >= 0){
      // 着地
      b.y = fy;
      b.vy = 0;
      b.floorIdx = i;
      b.falling = false;

      // 足場の傾きに合わせて速度調整
      const angle = floorAngle(fl);
      const gravity_along = Math.sin(angle) * 9.8 * 0.04;
      // 方向は足場の傾きで決まる（tilt>0なら右が低い→右向き加速）
      if(!b.vxSet){
        // 最初に乗った時: tiltで転がり方向決定
        b.vx = fl.tilt >= 0 ? Math.abs(b.vx) : -Math.abs(b.vx);
        b.vxSet = true;
      }
      b.vx += gravity_along * Math.sign(b.vx||1);
      b.vx = Math.max(-5, Math.min(5, b.vx));
      landed = true;
      break;
    }
  }

  if(!landed){
    b.falling = true;
    b.vxSet = false;
  }

  // 足場の端 → 落下させる（次の段へ）
  if(!b.falling && b.floorIdx >= 0){
    const fl = FLOORS[b.floorIdx];
    if(b.x > fl.x+fl.w+BARREL_R || b.x < fl.x-BARREL_R){
      b.falling = true;
      b.floorIdx = -1;
      b.vxSet = false;
      // 落下時の初速
      b.vy = 1;
    }
  }

  // 回転
  b.rot += b.vx * 0.06;

  // 最下段（地面）より下に落ちたらミス
  if(b.y > 580){
    return 'miss';
  }

  // 左右に完全に出たらミス
  if(b.x < -60 || b.x > 700){
    return 'miss';
  }

  return 'ok';
}

// ══════════════════════════════════════════════
//  タイピング判定
// ══════════════════════════════════════════════
function checkTyping(){
  let target=null;
  for(const b of barrels){
    if(b.word.startsWith(currentInput) && currentInput.length>0){
      if(!target || currentInput.length > target.typed.length) target=b;
    }
  }
  barrels.forEach(b=>b.typed='');
  if(target){
    target.typed=currentInput;
    if(target.typed===target.word){
      addParticles(target.x,target.y);
      score+=target.word.length*10*(diffIndex+1);
      barrels=barrels.filter(b=>b!==target);
      currentInput='';
      inputBox.textContent='　';
      updateHUD();
    }
  }
}

document.addEventListener('keydown',e=>{
  if(!gameRunning) return;
  if(e.key==='Backspace') currentInput=currentInput.slice(0,-1);
  else if(e.key.length===1) currentInput+=e.key;
  else return;
  inputBox.textContent=currentInput||'　';
  checkTyping();
});

// ══════════════════════════════════════════════
//  メインループ
// ══════════════════════════════════════════════
function loop(){
  if(!gameRunning) return;

  ctx.clearRect(0,0,640,560);
  drawBG();
  drawKong();

  frame++;
  spawnTimer++;

  // スポーン
  if(spawnTimer >= spawnInterval){
    spawnTimer=0;
    spawnBarrel();
    spawnInterval = Math.max(50, spawnInterval-3);
    baseSpeed     = Math.min(3.5, baseSpeed+0.05);
    level         = Math.floor(frame/400)+1;
    updateHUD();
  }

  // 樽更新
  for(let i=barrels.length-1;i>=0;i--){
    const b=barrels[i];
    const res=updateBarrel(b);
    if(res==='miss'){
      barrels.splice(i,1);
      lives--;
      currentInput='';
      inputBox.textContent='　';
      barrels.forEach(b=>b.typed='');
      updateHUD();
      if(lives<=0){endGame();return;}
    }
  }

  // 描画（落下中の樽を後ろに、手前の樽を前に）
  barrels.forEach(b=>drawBarrel(b));
  drawParticles();

  requestAnimationFrame(loop);
}

// ══════════════════════════════════════════════
//  開始・終了
// ══════════════════════════════════════════════
function startGame(){
  barrels=[]; particles=[];
  score=0; lives=3; level=1; frame=0;
  spawnTimer=0; spawnInterval=160; baseSpeed=1.2;
  currentInput='';
  inputBox.textContent='　';
  gameRunning=true;
  overlay.style.display='none';
  updateHUD();
  loop();
}

function endGame(){
  gameRunning=false;
  overlay.style.display='flex';
  overlay.innerHTML=`
    <h1>GAME<br>OVER</h1>
    <p style="font-family:'Press Start 2P',monospace;font-size:15px;color:#fff;">SCORE: ${score}</p>
    <p class="sub">LV ${level} まで到達！</p>
    <button onclick="location.reload()">▶ もう一度</button>
  `;
}
</script>
</body>
</html>
